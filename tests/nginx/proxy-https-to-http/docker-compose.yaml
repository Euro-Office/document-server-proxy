version: '2'
services:
  euro-office-documentserver:
    container_name: euro-office-documentserver
    image: ghcr.io/euro-office/documentserver:latest
    stdin_open: true
    restart: always
    networks:
      euro-office:
        aliases:
          - backendserver-address
    expose:
      - '80'

  euro-office-nginx:
    container_name: euro-office-nginx
    image: nginx:1.11
    depends_on:
      - euro-office-documentserver
    stdin_open: true
    volumes:
      - ../../../nginx/proxy-https-to-http.conf:/etc/nginx/conf.d/default.conf
      - ./server.crt:/etc/ssl/certs/server.crt
      - ./server.key:/etc/ssl/private/server.key
    restart: always
    networks:
     - euro-office
    ports:
      - '80:80'
      - '443:443'

networks:
  euro-office:
    driver: 'bridge'

