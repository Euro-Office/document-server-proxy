version: '2'
services:
  euro-office-documentserver:
    container_name: euro-office-documentserver
    image: ghcr.io/euro-office/documentserver:latest
    stdin_open: true
    restart: always
    networks:
      euro-office:
        aliases:
          - backendserver-address
    expose:
      - '80'

  euro-office-nginx:
    container_name: euro-office-nginx
    image: nginx:1.11
    depends_on:
      - euro-office-documentserver
    stdin_open: true
    volumes:
      - ../../../nginx/minimal.conf:/etc/nginx/conf.d/default.conf
    restart: always
    networks:
     - euro-office
    ports:
      - '80:80'

networks:
  euro-office:
    driver: 'bridge'

