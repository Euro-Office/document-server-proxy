version: '2'
services:
  euro-office-documentserver:
    container_name: euro-office-documentserver
    image: ghcr.io/euro-office/documentserver:latest
    stdin_open: true
    restart: always
    networks:
      euro-office:
        aliases:
          - backendserver-address
    expose:
      - '80'

  euro-office-haproxy:
    container_name: euro-office-haproxy
    image: haproxy:1.5
    depends_on:
      - euro-office-documentserver
    stdin_open: true
    volumes:
      - ../../../haproxy/proxy-https-to-http.cfg:/usr/local/etc/haproxy/haproxy.cfg
      - ./server.pem:/etc/ssl/certs/server.pem
    restart: always
    networks:
     - euro-office
    ports:
      - '80:80'
      - '443:443'

networks:
  euro-office:
    driver: 'bridge'

