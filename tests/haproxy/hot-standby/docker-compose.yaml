version: '2.2'
services:
  euro-office-documentserver-data:
    container_name: euro-office-documentserver-data
    image: ghcr.io/euro-office/documentserver:latest
    environment:
      - ONLYOFFICE_DATA_CONTAINER=true
      - DB_HOST=euro-office-postgresql
      - DB_PORT=5432
      - DB_NAME=onlyoffice
      - DB_USER=onlyoffice
      - AMQP_URI=amqp://guest:guest@euro-office-rabbitmq
      - REDIS_SERVER_HOST=euro-office-redis
      - REDIS_SERVER_PORT=6379
    stdin_open: true
    restart: always
    volumes:
       - /etc/onlyoffice
       - /var/www/onlyoffice/Data
       - /var/log/onlyoffice
       - /var/lib/onlyoffice/documentserver/App_Data/cache/files
       - /var/www/onlyoffice/documentserver-example/public/files
       - /usr/share/fonts

  backendserver-address-1:
    image: ghcr.io/euro-office/documentserver:latest
    container_name: backendserver-address-1
    depends_on:
      - euro-office-documentserver-data
      - euro-office-postgresql
      - euro-office-redis
      - euro-office-rabbitmq
    environment:
      - ONLYOFFICE_DATA_CONTAINER_HOST=euro-office-documentserver-data
    stdin_open: true
    restart: always
    expose:
      - '80'
    volumes_from:
     - euro-office-documentserver-data

  backendserver-address-2:
    image: ghcr.io/euro-office/documentserver:latest
    container_name: backendserver-address-2
    depends_on:
      - euro-office-documentserver-data
      - euro-office-postgresql
      - euro-office-redis
      - euro-office-rabbitmq
    environment:
      - ONLYOFFICE_DATA_CONTAINER_HOST=euro-office-documentserver-data
    stdin_open: true
    restart: always
    expose:
      - '80'
    volumes_from:
     - euro-office-documentserver-data

  euro-office-haproxy:
    container_name: euro-office-haproxy
    image: haproxy:1.5
    depends_on:
      - backendserver-address-1
      - backendserver-address-2
    stdin_open: true
    volumes:
      - ../../../haproxy/hot-standby.cfg:/usr/local/etc/haproxy/haproxy.cfg
    restart: always
    ports:
      - '80:80'
      - '1936:1936'

  euro-office-redis:
    container_name: euro-office-redis
    image: redis
    restart: always
    expose:
      - '6379'

  euro-office-rabbitmq:
    container_name: euro-office-rabbitmq
    image: rabbitmq
    restart: always
    expose:
      - '5672'

  euro-office-postgresql:
    container_name: euro-office-postgresql
    image: postgres:9.5
    environment:
      - POSTGRES_DB=onlyoffice
      - POSTGRES_USER=onlyoffice
      - POSTGRES_HOST_AUTH_METHOD=trust
    restart: always
    expose:
      - '5432'
    volumes:
      - postgresql_data:/var/lib/postgresql

volumes:
  postgresql_data: