version: '2'
services:
  euro-office-documentserver:
    container_name: euro-office-documentserver
    image: ghcr.io/euro-office/documentserver:latest
    stdin_open: true
    restart: always
    networks:
      euro-office:
        aliases:
          - backendserver-address
    expose:
      - '80'

  euro-office-httpd:
    container_name: euro-office-httpd
    image: httpd:2.4.23
    depends_on:
      - euro-office-documentserver
    stdin_open: true
    volumes:
      - ../../../apache/proxy-https-to-http.conf:/usr/local/apache2/conf/httpd.conf
      - ./server.crt:/etc/ssl/certs/server.crt
      - ./server.key:/etc/ssl/private/server.key
    restart: always
    networks:
     - euro-office
    ports:
      - '80:80'
      - '443:443'

networks:
  euro-office:
    driver: 'bridge'

