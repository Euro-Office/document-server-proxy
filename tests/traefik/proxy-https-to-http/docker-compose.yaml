version: '2'
services:
  euro-office-documentserver:
    container_name: euro-office-documentserver
    image: ghcr.io/euro-office/documentserver:latest
    stdin_open: true
    restart: always
    networks:
      euro-office:
        aliases:
          - backendserver-address
    expose:
      - '80'

  euro-office-traefik:
    container_name: euro-office-traefik
    image: traefik:1.5
    depends_on:
      - euro-office-documentserver
    stdin_open: true
    volumes:
      - ../../../traefik/proxy-https-to-http.toml:/etc/traefik/traefik.toml
      - ./server.crt:/etc/ssl/certs/server.crt
      - ./server.key:/etc/ssl/private/server.key
    restart: always
    networks:
     - euro-office
    ports:
      - '80:80'
      - '443:443'

networks:
  euro-office:
    driver: 'bridge'

